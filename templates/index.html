<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#2563eb,#4f46e5);
            color:white;
        }

        .container{
            text-align:center;
            background:rgba(255,255,255,.12);
            backdrop-filter:blur(10px);
            padding:50px;
            border-radius:20px;
            width:700px;
            box-shadow:0 15px 35px rgba(0,0,0,.3);
        }

        h1{
            font-size:3rem;
            margin-bottom:20px;
        }

        p{
            font-size:1.2rem;
            line-height:1.8;
            margin-bottom:35px;
        }

        .btn{
            display:inline-block;
            padding:15px 35px;
            background:#ffffff;
            color:#2563eb;
            text-decoration:none;
            font-weight:bold;
            border-radius:50px;
            transition:.3s;
        }

        .btn:hover{
            background:#1e293b;
            color:white;
            transform:translateY(-3px);
        }

        footer{
            margin-top:40px;
            font-size:.9rem;
            color:#dbeafe;
        }
    </style>

</head>

<body>

<div class="container">

    <h1>🎓 Student Performance Predictor</h1>

    <p>
        Welcome to the Student Performance Predictor.
        This machine learning application predicts a student's
        mathematics score using demographic and educational information.
    </p>

    <a href="/predict" class="btn">
        Start Prediction →
    </a>

    <footer>
        Built  using Flask & Machine Learning
    </footer>

</div>

</body>
</html>
