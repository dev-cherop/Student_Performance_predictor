<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#2563eb,#4f46e5);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
        }

        .card{
            max-width:800px;
            width:100%;
            border:none;
            border-radius:20px;
            box-shadow:0 15px 35px rgba(0,0,0,.2);
        }

        .card-header{
            background:#2563eb;
            color:white;
            text-align:center;
            padding:25px;
        }

        .card-header h1{
            font-size:2rem;
            margin-bottom:5px;
        }

        .btn-primary{
            background:#2563eb;
            border:none;
        }

        .btn-primary:hover{
            background:#1d4ed8;
        }

        .prediction{
            margin-top:25px;
            text-align:center;
        }

        .prediction h3{
            color:#198754;
            font-weight:bold;
        }
    </style>

</head>
<body>

<div class="card">

    <div class="card-header">
        <h1>🎓 Student Performance Predictor</h1>
        <p class="mb-0">
            Predict a student's Mathematics score using demographic and academic information.
        </p>
    </div>

    <div class="card-body">

        <form action="{{ url_for('predict_datapoint') }}" method="POST">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">Gender</label>
                    <select class="form-select" name="gender" required>
                        <option selected disabled>Select Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Race / Ethnicity</label>
                    <select class="form-select" name="ethnicity" required>
                        <option selected disabled>Select Group</option>
                        <option value="group A">Group A</option>
                        <option value="group B">Group B</option>
                        <option value="group C">Group C</option>
                        <option value="group D">Group D</option>
                        <option value="group E">Group E</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Parental Education</label>
                    <select class="form-select" name="parental_level_of_education" required>
                        <option selected disabled>Select Education</option>
                        <option value="associate's degree">Associate's Degree</option>
                        <option value="bachelor's degree">Bachelor's Degree</option>
                        <option value="master's degree">Master's Degree</option>
                        <option value="high school">High School</option>
                        <option value="some college">Some College</option>
                        <option value="some high school">Some High School</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Lunch Type</label>
                    <select class="form-select" name="lunch" required>
                        <option selected disabled>Select Lunch Type</option>
                        <option value="standard">Standard</option>
                        <option value="free/reduced">Free / Reduced</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Test Preparation</label>
                    <select class="form-select" name="test_preparation_course" required>
                        <option selected disabled>Select Status</option>
                        <option value="completed">Completed</option>
                        <option value="none">None</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Reading Score</label>
                    <input
                        type="number"
                        class="form-control"
                        name="reading_score"
                        placeholder="0 - 100"
                        min="0"
                        max="100"
                        required>
                </div>

                <div class="col-md-6 mb-4">
                    <label class="form-label">Writing Score</label>
                    <input
                        type="number"
                        class="form-control"
                        name="writing_score"
                        placeholder="0 - 100"
                        min="0"
                        max="100"
                        required>
                </div>

            </div>

            <div class="d-grid">
                <button class="btn btn-primary btn-lg">
                    Predict Mathematics Score
                </button>
            </div>

        </form>

        {% if results %}
        <div class="prediction">
            <hr>
            <h3>📊 Predicted Mathematics Score</h3>
            <div class="alert alert-success fs-3">
                {{ results }}
            </div>
        </div>
        {% endif %}

    </div>

</div>

</body>
</html>
